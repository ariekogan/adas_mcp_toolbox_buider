server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Allow large deploy payloads (connector code + UI assets)
  client_max_body_size 20m;

  # Custom 502 page — auto-retries so deploys don't show ugly errors
  error_page 502 503 504 /502.html;
  location = /502.html {
    internal;
    default_type text/html;
    return 200 '<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Restarting...</title>
<style>
  body{margin:0;height:100vh;display:flex;align-items:center;justify-content:center;
       background:#0d1117;color:#c9d1d9;font-family:-apple-system,sans-serif}
  .box{text-align:center}
  .spinner{width:40px;height:40px;margin:0 auto 20px;border:3px solid #30363d;
           border-top-color:#58a6ff;border-radius:50%;animation:spin 1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  h2{margin:0 0 8px;font-size:20px;color:#f0f6fc}
  p{margin:0;color:#8b949e;font-size:14px}
</style>
<script>setTimeout(()=>location.reload(),3000)</script>
</head><body><div class="box">
  <div class="spinner"></div>
  <h2>Backend restarting</h2>
  <p>Retrying in 3 seconds...</p>
</div></body></html>';
  }

  # Hashed assets — cache forever (Vite adds content hash to filenames)
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # SPA routing — no cache on HTML so deploys take effect immediately
  location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header Pragma "no-cache";
  }

  # Docker DNS resolver — prevents stale DNS when backend containers are recreated
  resolver 127.0.0.11 valid=10s;

  # Proxy API to skill-builder backend
  # Uses variable so nginx re-resolves DNS on each request (not cached at startup)
  location /api/ {
    set $backend_upstream skill-builder-backend;
    proxy_pass http://$backend_upstream:4000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 300s;
    proxy_connect_timeout 300s;
    proxy_send_timeout 300s;
    proxy_intercept_errors on;
  }

  # Proxy voice API to voice-backend
  location /voice-api/ {
    set $voice_upstream voice-backend;
    rewrite ^/voice-api/(.*) /api/$1 break;
    proxy_pass http://$voice_upstream:4000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 300s;
    proxy_connect_timeout 300s;
    proxy_send_timeout 300s;
    proxy_intercept_errors on;
  }
}
